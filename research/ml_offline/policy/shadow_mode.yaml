# 新 ONNX 上线影子模式策略 (起步值)
#
# 由 ml_offline/eval/shadow_mode.py + nezha/ml_runtime(待写) 协同读取。
# 首次上线观察后(Phase C)按 v_next 实际 Q 分布调阈值。
#
# 影子模式 = v_current 跑主路, v_next 同时推理但**只采集指标不切主路**。
# 目的: 离线 A/B 通过后, 用真实在线数据再确认一遍, 防止 hold-out 集偏置上线翻车。

shadow_duration_days: 7              # starter; 短则样本不足, 长则迭代慢
required_frames: 20000               # starter ≈ 2fps × 7天 内的活跃采集帧

compare_metric: quality.sbr          # 后续可换 quality.residual_energy 或综合分

# 通过判定(同时满足才切主路)
pass_rule: |
  v_next 滚动窗口的 P25 (底部 25 分位) ≥ v_current 滚动窗口的中位数
  AND 在每个 environment.fog.level (clear / light / medium / dense) 桶内,
      v_next 平均 Q 不低于 v_current 平均 Q

rolling_window_frames: 1000          # starter; compare_metric 滚动统计窗口

# 自动回滚(影子期间持续监控, 触发后切回 v_current)
rollback:
  q_drop_pct: 10                     # starter; v_next 实时 Q 1h 内跌 >10% 即回滚
  q_drop_window_minutes: 60          # starter
  action: switch_to_current          # 切回 v_current ONNX
  alert: syslog                      # 同时写 syslog 让操作员事后看到

# 算力预算(影子双跑的资源开销关注点)
budget:
  max_extra_latency_ms: 30           # 影子推理不能让主路时延变差超过这个值
                                     # 否则只做离线 A/B, 不进影子(降级到非影子直接切)
  max_cpu_extra_pct: 25              # CPU 额外占用上限; 超了同样降级

# 标定指引(Phase C 首次上线后)
# 1. v1.0 上线先跑足 shadow_duration_days, 不管通过与否, 记录 Q 分布
# 2. 据此把 rolling_window_frames / q_drop_pct 调到与实际波动匹配
# 3. 后续模型迭代沿用新值, 但仍保留 starter 在注释里
